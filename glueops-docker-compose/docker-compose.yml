services:
  # DNS01 Let's Encrypt Certificate Manager
  letsencrypt:
    image: certbot/dns-route53:v3.1.0
    container_name: letsencrypt-dns
    restart: always
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    volumes:
      - letsencrypt:/etc/letsencrypt
      - ./deploy-hook.sh:/deploy-hook.sh:ro
      - ./ssl:/ssl
    entrypoint: /bin/sh
    command:
      - -c
      - |
        certbot certonly --dns-route53 \
          --non-interactive --agree-tos \
          --email ${ACME_EMAIL} \
          -d ${DOMAIN} -d "*.${DOMAIN}" \
          --deploy-hook /deploy-hook.sh \
          --keep-until-expiring

        # Manually run the hook logic once to ensure /ssl has the right files/perms
        # We manually set RENEWED_LINEAGE so the script knows where to look
        RENEWED_LINEAGE="/etc/letsencrypt/live/${DOMAIN}" /bin/sh /deploy-hook.sh

        while true; do
          sleep 12h
          certbot renew --deploy-hook /deploy-hook.sh
        done

  # OAuth2 Proxy - Now the Entry Point for HTTP/S
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: oauth2-proxy
    restart: always
    ports:
      #- "80:4180" # disabling port 80 entirely
      - "443:4443"
    environment:
      # Google OAuth Config
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH2_PROXY_REDIRECT_URL: https://auth.${DOMAIN}/oauth2/callback
      OAUTH2_PROXY_EMAIL_DOMAINS: "*" # Or "yourcompany.com"
      
      # Security & Cookie
      OAUTH2_PROXY_COOKIE_SECRET: ${COOKIE_SECRET}
      OAUTH2_PROXY_COOKIE_DOMAIN: ."${DOMAIN}"
      OAUTH2_PROXY_WHITELIST_DOMAIN: ."${DOMAIN}"
      
      # Upstream & SSL
      OAUTH2_PROXY_UPSTREAM: http://sish:80
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_HTTPS_ADDRESS: 0.0.0.0:4443
      OAUTH2_PROXY_TLS_CERT_FILE: /ssl/${DOMAIN}.crt
      OAUTH2_PROXY_TLS_KEY_FILE: /ssl/${DOMAIN}.key
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SET_XAUTHUSER: "true" # Passes the user email to sish headers
      OAUTH2_PROXY_COOKIE_SAMESITE: "lax"
      OAUTH2_PROXY_COOKIE_SECURE: "true"
    volumes:
      - ./ssl:/ssl:ro
    depends_on:
      - letsencrypt
      - sish

  # The SSH Server
  sish:
    image: ghcr.io/glueops/sish:v2.20.0-glueops3
    container_name: sish
    restart: always
    ports:
      - "2222:2222" # Keep SSH public
    # No longer exposing 80/443 to host; oauth2-proxy talks to sish internally
    volumes:
      - ./ssl:/ssl
    command: >
      --domain ${DOMAIN}
      --http-address :80
      --ssh-address :2222
      --authentication=true
      --bind-random-subdomains=false
      --authentication-key-request-url="http://authenticator:5000/"
      --authentication-key-request-timeout=15s
      --cleanup-unauthed-timeout=30s
      --append-user-to-subdomain-separator="-"
      --append-user-to-subdomain
      --cleanup-unbound
    depends_on:
      - authenticator

  # The Auth App (Handles SSH Key Auth)
  authenticator:
    build: ../python-glueops-auth
    container_name: sish-auth
    restart: always
    volumes:
      - ./sish_users:/data
    command: ["gunicorn", "-w", "4", "-b", "0.0.0.0:5000", "auth:app"]

volumes:
  letsencrypt:
